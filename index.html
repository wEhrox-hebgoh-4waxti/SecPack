<!DOCTYPE html>
<html lang="fa">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SecPack</title>

<link rel="stylesheet" href="Style.css">

</head>


<body>


<header class="header">

<div class="brand">

<div class="logo-box">

<img src="public/logo/AAA30CD7-16A5-4DC1-A124-4D3F7491EB66.jpg"
style="width:55px;height:55px;border-radius:15px;">

</div>


<div>

<h1>SecPack</h1>

<p>
Evidence-Based Infrastructure for Global Trade
</p>

</div>

</div>



<div class="language-buttons">

<button onclick="changeLanguage('fa')">
فارسی
</button>

<button onclick="changeLanguage('ar')">
العربية
</button>

<button onclick="changeLanguage('en')">
English
</button>

</div>


</header>



<section class="hero">


<h2 data-i18n="title">

</h2>


<p data-i18n="subtitle">

</p>


<button class="main-button" data-i18n="start">

</button>


</section>




<section class="simple-section">


<h2 data-i18n="product">

</h2>


<div class="cards">


<div class="card">

<div class="icon">
📦
</div>

<h3 data-i18n="find_product"></h3>

<p data-i18n="find_product_desc"></p>

</div>



<div class="card">

<div class="icon">
🌎
</div>

<h3 data-i18n="find_supplier"></h3>

<p data-i18n="find_supplier_desc"></p>

</div>



<div class="card">

<div class="icon">
🤖
</div>

<h3 data-i18n="analyze"></h3>

<p data-i18n="analyze_desc"></p>

</div>


</div>


</section>




<section class="assistant">

<h2 data-i18n="assistant"></h2>

<p data-i18n="assistant_desc"></p>


<div id="ai-result">

</div>


</section>




<footer>

SecPack © 2026

</footer>



<script src="Language.js"></script>

<script src="Script.js"></script>


</body>

</html>
