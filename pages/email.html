<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SecPack Email Center</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>


<header class="topbar">

<div class="logo-area">

<div class="logo-box">

<img src="../logo.jpg" alt="SecPack Logo">

</div>

<div>

<h1>SecPack</h1>

<p>Supplier Communication Center</p>

</div>

</div>

</header>



<section class="hero">

<h2>
Email Generator
</h2>

<p>
Create professional supplier messages
</p>

</section>




<section class="card">


<h2>
Supplier Name
</h2>

<input id="supplier-name"
placeholder="Example: HiTech Resins">


<h2>
Email Type
</h2>


<select id="email-type">

<option value="rfq">
Request For Quote
</option>


<option value="sample">
Sample Request
</option>


<option value="followup">
Follow Up
</option>


<option value="document">
Request TDS / COA
</option>


</select>



<button onclick="generateEmail()">

Generate Email

</button>



<textarea 
id="email-result"
rows="12"
placeholder="Generated email will appear here">
</textarea>



</section>




<footer>

SecPack Enterprise © 2026

</footer>



<script src="../script.js"></script>


</body>

</html>
