<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SecPack AI Email Composer</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>


<header class="topbar">

<div class="logo-area">

<div class="logo-box">

<img src="../logo.jpg" alt="SecPack Logo">

</div>


<div>

<h1>SecPack</h1>

<p>AI Business Communication</p>

</div>

</div>

</header>



<section class="hero">

<h2>
AI Email Composer
</h2>

<p>
Create professional supplier negotiation emails
</p>

</section>




<section class="card">


<h3>Supplier Company</h3>

<input id="supplier-name" placeholder="Example: HiTech Resins">


<h3>Contact Person</h3>

<input id="contact-name" placeholder="Example: Imran">


<h3>Product</h3>

<input id="product-name" placeholder="Example: Water Based Lamination Adhesive">


<h3>Market</h3>

<select id="market">

<option>Iran</option>

<option>Iraq</option>

<option>Pakistan</option>

</select>



<h3>Purchase Volume</h3>

<select id="volume">

<option>Sample Evaluation</option>

<option>1 Ton Trial Order</option>

<option>20ft Container</option>

</select>




<h3>Email Goal</h3>

<select id="goal">

<option value="price">
Negotiate Best Price
</option>

<option value="sample">
Request Sample
</option>

<option value="technical">
Request Technical Documents
</option>

<option value="cooperation">
Long Term Cooperation
</option>

</select>




<button onclick="generateBusinessEmail()">

Generate Business Email

</button>



<textarea 
id="email-result"
rows="18"
placeholder="Generated email">

</textarea>



</section>



<footer>

SecPack Enterprise © 2026

</footer>



<script src="../script.js"></script>


</body>

</html>
