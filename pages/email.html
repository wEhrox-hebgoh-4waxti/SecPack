<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SecPack AI Email Composer</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>


<header class="topbar">

<div class="logo-area">

<div class="logo-box">

<img src="../logo.jpg" alt="SecPack Logo">

</div>


<div>

<h1>SecPack</h1>

<p>AI Business Communication</p>

</div>

</div>

</header>




<section class="hero">

<h2>
AI Email Composer
</h2>

<p>
Create negotiation emails based on your business situation.
</p>

</section>




<section class="card">


<h3>Supplier Name</h3>

<input id="supplier-name" placeholder="Example: HiTech Resins">


<h3>Contact Person</h3>

<input id="contact-name" placeholder="Example: Imran">


<h3>Product</h3>

<input id="product-name" placeholder="Example: Water Based Lamination Adhesive">


<h3>Requirement</h3>

<input id="requirement" placeholder="Example: 20ft container / 16 tons">


<h3>Target Price</h3>

<input id="target-price" placeholder="Example: USD 1.40/kg">


<h3>Email Purpose</h3>

<select id="email-purpose">

<option value="price">
Price Negotiation
</option>

<option value="sample">
Sample Request
</option>

<option value="cooperation">
Long Term Cooperation
</option>

<option value="followup">
Follow Up
</option>

</select>



<button onclick="generateBusinessEmail()">

Generate Professional Email

</button>



<textarea 
id="email-result"
rows="15"
placeholder="AI generated email">

</textarea>


</section>




<footer>

SecPack Enterprise © 2026

</footer>



<script src="../script.js"></script>


</body>

</html>
